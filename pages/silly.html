        <script>
            function getScrollFrac() {
                var h = document.documentElement, 
                b = document.body,
                st = 'scrollTop',
                sh = 'scrollHeight';
                return (h[st]||b[st]) / ((h[sh]||b[sh]) - h.clientHeight);
            }
            function ballin() {
                var sp = getScrollFrac();
                var opac = 1-sp;
                document.getElementById("ballin1").style.opacity = opac;
            }
            window.addEventListener("scroll", () => {ballin();})
