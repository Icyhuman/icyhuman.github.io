        <script>
            const larea=document.getElementById('larea')
            function makeletter(text, name, date){
                const letter = document.createElement("div");
                letter.className="letter"
                const dearj = document.createElement("p");
                dearj.className="dearj"
                dearj.innerHTML="Dear Jørgen"
                const mainlbox = document.createElement("div");
                mainlbox.className="mainlbox"
                const mainl = document.createElement("p");
                mainl.className="mainl"
                mainl.innerHTML=text
                const froml = document.createElement("p");
                froml.className="froml"
                froml.innerHTML="From "+name
                const datel = document.createElement("p");
                datel.className="datel"
                datel.innerHTML=date

                larea.appendChild(letter)
                letter.appendChild(dearj)
                letter.appendChild(mainlbox)
                letter.appendChild(froml)
                letter.appendChild(datel)
                mainlbox.appendChild(mainl)

                let styles=["hearts","cool","clouds","cherry","airmail","grafitti","dragonflies","stars","torn","roses","bluesky"]
                let style = Math.floor(Math.random()* 11);
                letter.classList.add(styles[style])

                let rotate = Math.floor(Math.random()* 26)-13;
                letter.style.transform="Rotate("+rotate+"deg)"
                letter.addEventListener('mouseenter', () => {
                    letter.style.transform = 'Rotate(0deg)';
                    });
                letter.addEventListener('mouseleave', () => {
                    letter.style.transform = "Rotate("+rotate+"deg)";
                    });


            }


            const mailbag=[
                ["Me when I make sample data to make sure my code works",
                "Mr. testing","Glontchtober 65th"],

                "Mrs. testing","Baldcember 900th"],
                ["This layout only has room for 15 letters before I need to make pages. At the current pace, that means I have to fix it in a couple years lol",
                "Fred Flintstone","Sample date 25th"]
            ]

            const box = document.getElementById('HCB_comment_box');
            window.addEventListener('load', function() {
                console.log("this")
                mload();
            });
            function mload(){

                box.children[0].style.display="none"
                box.children[2].style.display="none"
                box.children[4].style.display="none"
                box.children[6].style.display="none"
                box.children[3].style.width="280px"
                box.children[3].style.position="absolute"
                box.children[3].style.left="20px"
                box.children[3].style.top="40px"
                let navi=box.children[5]
                const letterfield = document.getElementById('hcb_form_content')
                console.log(letterfield.parentElement.parentElement.parentElement)
                const namefield = document.getElementById('hcb_form_name')
                letterfield.parentElement.parentElement.parentElement.insertBefore(letterfield.parentElement.parentElement,namefield.parentElement.parentElement)
                const submit = document.getElementById('hcb_submit')
                letterfield.style.background="transparent"
                namefield.style.background="transparent"
                namefield.style.position="absolute"
                namefield.style.right="0px"
                submit.value="Send mail"
                letterfield.placeholder="Write your letter here"
                namefield.style.width="155px"
                let desc=document.getElementsByClassName("home-desc")
                desc[0].style.display
                desc[0].innerHTML="Powered by <a target='_blank' href='https://www.htmlcommentbox.com'>Html Comment Box</a>"
                console.log(desc[0])
                navi.style.position="absolute"
                navi.style.left="970px"
                navi.style.top="880px"
                navi.addEventListener("click", function(){
                    resetgb()
                })

                for(comment in comments){
                    let name = comments[comment].author
                    let date = comments[comment].date
                    let text = comments[comment].comment
                    let dreal = new Date(date*1000)
                    date=dreal.toDateString()
                    console.log(name)
                    console.log(date)
                    console.log(text)
                    makeletter(text,name,date)
                    mailbag.push([text,name,date])
            }
            }
            function resetgb() {
                letters=document.getElementsByClassName("letter")
                console.log(letters)
                for(var letter of letters){
                    letter.remove()
                }
                window.addEventListener('load', function() {
                console.log("this")
                mload();
                });
